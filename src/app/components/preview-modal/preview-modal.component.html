<ng-container *ngIf="file">
  <div class="modal-backdrop fade show"></div>
  <div class="modal d-block" tabindex="-1" (click)="closed.emit()">
    <div class="modal-dialog modal-dialog-centered preview-dialog" (click)="$event.stopPropagation()">
      <div class="modal-content preview-content">
        <div class="modal-header py-2">
          <h5 class="modal-title text-truncate">
            <i class="bi bi-eye me-2"></i>{{ file.name }}
          </h5>
          <button type="button" class="btn-close" (click)="closed.emit()"></button>
        </div>
        <div class="preview-body">
          <iframe [src]="previewUrl | safe" allowfullscreen></iframe>
        </div>
      </div>
    </div>
  </div>
</ng-container>
